groups:
  - name: alfq_p0
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels: { severity: P0 }
        annotations: { summary: "Service {{ $labels.job }} is down" }

      - alert: KillSwitchActivated
        expr: alfq_kill_switch_active > 0
        labels: { severity: P0 }
        annotations: { summary: "Kill switch activated — all trading halted" }

      - alert: HighRejectRate
        expr: rate(alfq_risk_rejections_total[5m]) / rate(alfq_oms_order_total[5m]) > 0.3
        for: 2m
        labels: { severity: P0 }
        annotations: { summary: "Order rejection rate > 30%" }

  - name: alfq_p1
    rules:
      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(alfq_md_tick_latency_bucket[5m])) > 200
        for: 5m
        labels: { severity: P1 }
        annotations: { summary: "Tick latency p99 > 200ms" }

      - alert: FactorEngineSlow
        expr: rate(alfq_factor_eval_duration_seconds_sum[5m]) / rate(alfq_factor_eval_duration_seconds_count[5m]) > 1
        for: 5m
        labels: { severity: P1 }
        annotations: { summary: "Factor eval average > 1s" }

      - alert: NATSDisconnected
        expr: alfq_nats_connected == 0
        for: 30s
        labels: { severity: P1 }
        annotations: { summary: "NATS connection lost" }

  - name: alfq_p2
    rules:
      - alert: DiskQueueGrowing
        expr: alfq_md_disk_queue_bytes > 104857600
        for: 10m
        labels: { severity: P2 }
        annotations: { summary: "CH disk queue > 100MB" }
