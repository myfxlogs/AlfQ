version: "3.9"

services:
  # ── Infrastructure ──
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: alfq
      POSTGRES_PASSWORD: alfq_dev
      POSTGRES_DB: alfq
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alfq"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [alfq-net]

  clickhouse:
    image: clickhouse/clickhouse-server:26.1-alpine
    environment:
      CLICKHOUSE_USER: alfq
      CLICKHOUSE_PASSWORD: alfq_dev
      CLICKHOUSE_DB: alfq
    ports: ["8123:8123"]  # native 9000 仅内网，避免与 trading-core 9000 冲突
    volumes: [ch_data:/var/lib/clickhouse]
    networks: [alfq-net]

  redis:
    image: redis:8-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [alfq-net]

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    ports: ["4222:4222", "8222:8222"]
    volumes: [nats_data:/data]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [alfq-net]

  vault:
    # 注：锁定 1.18，详见 docs/26 §4.4 豁免（WSL2 不支持 CAP_SETFCAP，无法运行 Vault 2.0）
    image: hashicorp/vault:1.18
    cap_add: [IPC_LOCK]
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_DEV_ROOT_TOKEN_ID: alfq_dev_root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["8200:8200"]
    volumes: [vault_data:/vault/file]
    command: server -dev
    restart: unless-stopped
    networks: [alfq-net]

  prometheus:
    image: prom/prometheus:v3.11.3
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prom_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped
    networks: [alfq-net]

  grafana:
    image: grafana/grafana:13.0.1
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports: ["3000:3000"]
    restart: unless-stopped
    networks: [alfq-net]

  loki:
    image: grafana/loki:3.7.2
    volumes:
      - ./loki/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: "-config.file=/etc/loki/local-config.yaml"
    restart: unless-stopped
    networks: [alfq-net]

  tempo:
    image: grafana/tempo:2.10.5
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    command: "-config.file=/etc/tempo/config.yaml"
    restart: unless-stopped
    networks: [alfq-net]

  # ── Application (5 services) ──
  trading-core:
    build:
      context: ..
      dockerfile: backend/go/cmd/trading-core/Dockerfile
    ports: ["9000:9000"]
    volumes:
      - ../configs:/app/configs:ro
    environment:
      DATABASE_URL: "postgres://alfq:alfq_dev@postgres:5432/alfq?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      NATS_URL: "nats://nats:4222"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      nats:     { condition: service_healthy }
    networks: [alfq-net]

  quant-engine:
    build:
      context: ..
      dockerfile: backend/go/cmd/quant-engine/Dockerfile
    ports: ["9002:9002"]
    environment:
      NATS_URL: "nats://nats:4222"
    depends_on:
      nats: { condition: service_healthy }
    networks: [alfq-net]

  md-gateway:
    build:
      context: ..
      dockerfile: backend/go/cmd/md-gateway/Dockerfile
    ports: ["9001:9001"]
    environment:
      NATS_URL: "nats://nats:4222"
      REDIS_ADDR: "redis:6379"
      CH_ADDR: "clickhouse:9000"
    depends_on:
      nats:       { condition: service_healthy }
      redis:      { condition: service_healthy }
      clickhouse: { condition: service_started }
    networks: [alfq-net]

  assistant-svc:
    build:
      context: ..
      dockerfile: backend/go/cmd/assistant-svc/Dockerfile
    ports: ["9003:9003"]
    environment: {}
    networks: [alfq-net]

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports: ["80:80"]
    depends_on:
      trading-core: { condition: service_started }
    networks: [alfq-net]

volumes:
  pg_data:
  ch_data:
  redis_data:
  nats_data:
  vault_data:
  prom_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  alfq-net:
    name: alfq-net