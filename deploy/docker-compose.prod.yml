# ALFQ Production Docker Compose
# 所有密码/密钥通过 .env 文件或环境变量注入。
# 复制 .env.example → .env 并填入生产实际值。

services:
  # ── Infrastructure ──
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: alfq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
      POSTGRES_DB: alfq
    ports: ["127.0.0.1:5432:5432"]
    volumes: [pg_data:/var/lib/postgresql]
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alfq"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [alfq-net]

  clickhouse:
    image: clickhouse/clickhouse-server:26.4-alpine
    environment:
      CLICKHOUSE_USER: alfq
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?err}
      CLICKHOUSE_DB: alfq
    ports: ["127.0.0.1:8123:8123"]
    volumes: [ch_data:/var/lib/clickhouse]
    deploy:
      resources:
        limits: { memory: 1G, cpus: "2.0" }
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client -u alfq --password ${CLICKHOUSE_PASSWORD} -q 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [alfq-net]

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?err}"]
    ports: ["127.0.0.1:6379:6379"]
    volumes: [redis_data:/data]
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [alfq-net]

  nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222", "--user", "${NATS_USER:-alfq}", "--pass", "${NATS_PASSWORD:?err}"]
    ports: ["127.0.0.1:4222:4222", "127.0.0.1:8222:8222"]
    volumes: [nats_data:/data]
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [alfq-net]

  vault:
    image: hashicorp/vault:1.18
    cap_add: [IPC_LOCK]
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
    ports: ["127.0.0.1:8200:8200"]
    volumes:
      - ./vault/vault.hcl:/vault/myconfig.hcl:ro
      - vault_data:/vault/file
    entrypoint: sh
    command: -c "cp /vault/myconfig.hcl /vault/config/vault.hcl && exec vault server -config=/vault/config/vault.hcl"
    restart: unless-stopped
    networks: [alfq-net]
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
    healthcheck:
      test: ["CMD", "vault", "status", "-format=json"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.11.3
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prom_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped
    networks: [alfq-net]
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:13.0.1
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?err}
    ports: ["127.0.0.1:3000:3000"]
    restart: unless-stopped
    networks: [alfq-net]
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.7.2
    volumes:
      - ./loki/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: "-config.file=/etc/loki/local-config.yaml"
    restart: unless-stopped
    networks: [alfq-net]
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }

  tempo:
    image: grafana/tempo:2.10.5
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    command: "-config.file=/etc/tempo/config.yaml"
    restart: unless-stopped
    networks: [alfq-net]
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }

  # ── Application (5 services) ──
  trading-core:
    build:
      context: ..
      dockerfile: backend/go/Dockerfile.builder
      args: { SVC: trading-core }
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    ports: ["127.0.0.1:9000:9000"]
    volumes:
      - ../configs:/app/configs:ro
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: "nats://${NATS_USER:-alfq}:${NATS_PASSWORD}@nats:4222"
      PG_DSN: ${DATABASE_URL}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      nats:     { condition: service_healthy }
    networks: [alfq-net]

  quant-engine:
    image: alfq-quant-engine:latest
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9002/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    ports: ["127.0.0.1:9002:9002"]
    environment:
      LISTEN_ADDR: ":9002"
      NATS_URL: "nats://${NATS_USER:-alfq}:${NATS_PASSWORD}@nats:4222"
      CH_ADDR: "clickhouse:9000"
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      ALFQ_SPEC_DIR: /app/configs/specs
    volumes:
      - ../configs/specs:/app/configs/specs:ro
    depends_on:
      nats: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
    networks: [alfq-net]

  md-gateway:
    image: alfq-md-gateway:latest
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    ports: ["127.0.0.1:9001:9001"]
    environment:
      LISTEN_ADDR: ":9001"
      DATABASE_URL: ${DATABASE_URL}
      NATS_URL: "nats://${NATS_USER:-alfq}:${NATS_PASSWORD}@nats:4222"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CH_ADDR: "clickhouse:9000"
      CH_PASSWORD: ${CLICKHOUSE_PASSWORD}
    depends_on:
      nats:       { condition: service_healthy }
      redis:      { condition: service_healthy }
      clickhouse: { condition: service_healthy }
    networks: [alfq-net]

  backtest-runner:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backtest-runner
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 1G, cpus: "2.0" }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9009/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    ports: ["127.0.0.1:9009:9009"]
    environment:
      CH_ADDR: "clickhouse:9000"
      DATABASE_URL: ${DATABASE_URL}
    networks: [alfq-net]

  assistant-svc:
    build:
      context: ..
      dockerfile: backend/go/Dockerfile.builder
      args: { SVC: assistant-svc }
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9003/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    ports: ["127.0.0.1:9003:9003"]
    environment:
      LISTEN_ADDR: ":9003"
      DATABASE_URL: ${DATABASE_URL}
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN}
      # Fallback API keys (Vault is primary per ADR-0006)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      nats: { condition: service_healthy }
    networks: [alfq-net]

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 128M, cpus: "0.5" }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    ports: ["80:80"]
    depends_on:
      trading-core: { condition: service_started }
    networks: [alfq-net]

volumes:
  pg_data:
  ch_data:
  redis_data:
  nats_data:
  vault_data:
  prom_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  alfq-net:
    name: alfq-net