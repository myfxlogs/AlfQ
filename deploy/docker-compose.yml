version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: alfq
      POSTGRES_PASSWORD: alfq_dev
      POSTGRES_DB: alfq
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alfq"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - alfq-net

  clickhouse:
    image: clickhouse/clickhouse-server:26.1-alpine
    environment:
      CLICKHOUSE_USER: alfq
      CLICKHOUSE_PASSWORD: alfq_dev
      CLICKHOUSE_DB: alfq
    ports:
      - "8123:8123"
      # native 9000 仅内网（避免与 trading-core 9000 冲突）
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client -u alfq --password alfq_dev -q 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - alfq-net

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - alfq-net

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - alfq-net

  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: alfq_dev_root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8200/v1/sys/health >/dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 30s
    networks:
      - alfq-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: alfqadmin
      MINIO_ROOT_PASSWORD: alfq_dev_minio
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - alfq-net

volumes:
  pg_data:
  ch_data:
  redis_data:
  nats_data:
  minio_data:

networks:
  alfq-net:
    name: alfq-net
