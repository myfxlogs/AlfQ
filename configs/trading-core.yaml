server:
  listen: ":9000"
  # tls: {cert_file: "/certs/server.crt", key_file: "/certs/server.key"}  # 生产从 Vault PKI 注入

log:
  level: warn

# JWT 签发配置（EdDSA Ed25519，kid 轮换）
jwt:
  issuer: alfq
  access_ttl: 15m
  refresh_ttl: 168h
  # signing_key_env: JWT_SIGNING_KEY  # Base64 Ed25519 私钥
  # kid: "kid-2026-05-18"              # 当前活跃 kid

# Cookie 刷新令牌
cookie:
  domain: .example.com
  secure: true        # 生产 true（HTTPS）
  same_site: strict

# PostgreSQL 主库（交易/账户/审计）
pg:
  dsn_env: PG_DSN
  max_open: 50
  max_idle: 10

# ClickHouse 时序库
# ch:
#   addr: localhost:9000
#   database: alfq
#   username: default
#   password: ""

# Redis（缓存/会话/分布式锁/限流）
redis:
  addr: redis:6379
  db: 0
  password_env: REDIS_PASSWORD

# NATS JetStream（消息总线）
nats:
  url: nats://nats:4222

# MT4/MT5 gRPC 网关（经纪商搜索、账户连接）
mt4_gateway:
  addr: mt4grpc3.mtapi.io:443
  use_tls: true
  timeout: 30s
mt5_gateway:
  addr: mt5grpc3.mtapi.io:443
  use_tls: true
  timeout: 30s

# HashiCorp Vault（TOTP secret 加密、动态凭据）
# 注：broker 账号密码因 MT 协议要求明文，不纳入 Vault，见 doc 02 §1.3
vault:
  addr: http://localhost:8200
  # role_env: VAULT_ROLE
  # jwt_path_env: VAULT_JWT_PATH
