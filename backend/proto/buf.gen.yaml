version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/alfq/backend/go/gen
    except:
      - buf.build/bufbuild/protovalidate
plugins:
  # Go 后端
  - plugin: buf.build/protocolbuffers/go
    out: ../go/gen
    opt:
      - paths=source_relative
  - plugin: buf.build/connectrpc/go
    out: ../go/gen
    opt:
      - paths=source_relative
  # 前端 TypeScript (V2) 改由 buf.gen.frontend.yaml 生成
  # 因为 V2 不再生成 *_connect.ts，服务描述符由 protoc-gen-es v2 直接产出。
