syntax = "proto3";
package alfq.v1;
option go_package = "github.com/alfq/backend/go/gen/alfq/v1;alfqv1";

service StrategyService {
  rpc CreateStrategy(CreateStrategyRequest) returns (Strategy);
  rpc GetStrategy(GetStrategyRequest) returns (Strategy);
  rpc ListStrategies(ListStrategiesRequest) returns (ListStrategiesResponse);
  rpc DeployStrategy(DeployStrategyRequest) returns (Strategy);
  rpc StopStrategy(StopStrategyRequest) returns (Strategy);
  rpc PromoteToLive(PromoteToLiveRequest) returns (PromoteToLiveResponse);
  rpc StreamSignals(StreamSignalsRequest) returns (stream Signal);
}

message Strategy { string id = 1; string tenant_id = 2; string name = 3; string description = 4; string spec_json = 5; string status = 6; }
message CreateStrategyRequest { string tenant_id = 1; string name = 2; string description = 3; string spec_json = 4; }
message GetStrategyRequest { string id = 1; }
message ListStrategiesRequest { string tenant_id = 1; int32 page_size = 2; string page_token = 3; }
message ListStrategiesResponse { repeated Strategy strategies = 1; string next_page_token = 2; }
message DeployStrategyRequest { string id = 1; string account_id = 2; }
message StopStrategyRequest { string id = 1; }
message PromoteToLiveRequest { string id = 1; string tenant_admin_id = 2; string risk_officer_id = 3; }
message PromoteToLiveResponse { Strategy strategy = 1; bool approved = 2; string reason = 3; }
message StreamSignalsRequest { string strategy_id = 1; }
message Signal { string strategy_id = 1; string symbol = 2; string side = 3; double qty = 4; double confidence = 5; int64 ts_unix_ms = 6; }

service BacktestService {
  rpc RunBacktest(RunBacktestRequest) returns (stream BacktestProgress);
  rpc ListBacktests(ListBacktestsRequest) returns (ListBacktestsResponse);
}

message BacktestTask { string id = 1; string strategy_id = 2; string status = 3; string result_json = 4; }
message RunBacktestRequest { string strategy_id = 1; int64 start_ts_ms = 2; int64 end_ts_ms = 3; }
message BacktestProgress { string task_id = 1; double progress = 2; string status = 3; string result_json = 4; }
message ListBacktestsRequest { string strategy_id = 1; int32 page_size = 2; string page_token = 3; }
message ListBacktestsResponse { repeated BacktestTask tasks = 1; string next_page_token = 2; }

service SymbolService {
  rpc ListSymbols(ListSymbolsRequest) returns (ListSymbolsResponse);
  rpc ListBrokerSymbols(ListBrokerSymbolsRequest) returns (ListBrokerSymbolsResponse);
  rpc LookupSymbol(LookupSymbolRequest) returns (BrokerSymbolInfo);
}

message ListBrokerSymbolsRequest { string broker_id = 1; }
message ListBrokerSymbolsResponse { repeated BrokerSymbolInfo symbols = 1; }
message LookupSymbolRequest { string canonical = 1; string broker_id = 2; }
message BrokerSymbolInfo {
  string broker_id = 1; string symbol_raw = 2; string canonical = 3;
  int32 digits = 4; double point = 5; double tick_size = 6;
  double contract_size = 7; double min_lot = 8; double max_lot = 9; double lot_step = 10;
  double swap_long = 11; double swap_short = 12;
  string description = 13;
}

message Symbol { string name = 1; string description = 2; int32 digits = 3; double contract_size = 4; string currency = 5; }
message ListSymbolsRequest { string broker_id = 1; }
message ListSymbolsResponse { repeated Symbol symbols = 1; }

// ── M5: Strategy Symbol (Canonical) Management ──

service StrategySymbolService {
  // List available canonical symbols for a tenant (from tenant_canonical_whitelist).
  rpc ListAvailableCanonicals(ListAvailableCanonicalsRequest) returns (ListAvailableCanonicalsResponse);
  // Resolve canonical symbols for a specific account (shows symbol_raw + tradability).
  rpc ResolveCanonicalsForAccount(ResolveCanonicalsRequest) returns (ResolveCanonicalsResponse);
  // Set a strategy's canonical symbol whitelist.
  rpc UpdateStrategySymbols(UpdateStrategySymbolsRequest) returns (UpdateStrategySymbolsResponse);
}

message ListAvailableCanonicalsRequest {
  string tenant_id = 1;
}

message ListAvailableCanonicalsResponse {
  repeated CanonicalInfo canonicals = 1;
}

message CanonicalInfo {
  string canonical = 1;
  string asset_class = 2;
  string description = 3;
  bool enabled = 4;
}

message ResolveCanonicalsRequest {
  string account_id = 1;
  repeated string canonicals = 2;
}

message ResolveCanonicalsResponse {
  repeated CanonicalResolution resolutions = 1;
}

message CanonicalResolution {
  string canonical = 1;
  string symbol_raw = 2;     // broker-specific name
  bool tradable = 3;          // true if trade_mode > 0
  int32 trade_mode = 4;       // 0=disabled, 1=long_only, 2=short_only, 3=full
}

message UpdateStrategySymbolsRequest {
  string strategy_id = 1;
  repeated string canonicals = 2;  // complete list; replaces existing
}

message UpdateStrategySymbolsResponse {
  int32 added = 1;
  int32 removed = 2;
}
