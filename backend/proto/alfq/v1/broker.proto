syntax = "proto3";
package alfq.v1;
option go_package = "github.com/alfq/backend/go/gen/alfq/v1;alfqv1";

import "google/protobuf/timestamp.proto";

service BrokerService {
  rpc CreateBroker(CreateBrokerRequest) returns (Broker);
  rpc GetBroker(GetBrokerRequest) returns (Broker);
  rpc ListBrokers(ListBrokersRequest) returns (ListBrokersResponse);
  rpc UpdateBroker(Broker) returns (Broker);
  rpc DeleteBroker(DeleteBrokerRequest) returns (DeleteBrokerResponse);
  rpc SearchBroker(SearchBrokerRequest) returns (SearchBrokerResponse);
}

message Broker {
  string id = 1; string tenant_id = 2; string code = 3; string name = 4;
  string platform = 5; string mtapi_endpoint = 6; string default_server = 7;
}
message CreateBrokerRequest { string tenant_id = 1; string code = 2; string name = 3; string platform = 4; string mtapi_endpoint = 5; }
message GetBrokerRequest { string id = 1; }
message ListBrokersRequest { string tenant_id = 1; }
message ListBrokersResponse { repeated Broker brokers = 1; }
message DeleteBrokerRequest { string id = 1; }
message DeleteBrokerResponse {}

message SearchBrokerRequest {
  string platform = 1;     // "MT4" or "MT5"
  string keyword = 2;      // partial company name
}
message SearchBrokerResponse {
  repeated BrokerMatch matches = 1;
}
message BrokerMatch {
  string id = 1;         // broker UUID (empty when from online gateway search)
  string company = 2;
  repeated BrokerServer servers = 3;
}
message BrokerServer {
  string name = 1;    // e.g. "Exness-Real2"
  string access = 2;  // e.g. "63.179.160.248:443" — actual connection endpoint
}

service AccountService {
  rpc CreateAccount(CreateAccountRequest) returns (Account);
  rpc GetAccount(GetAccountRequest) returns (Account);
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);
  rpc UpdateAccount(Account) returns (Account);
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
  rpc ConnectAccount(ConnectAccountRequest) returns (ConnectAccountResponse);
  rpc DisconnectAccount(DisconnectAccountRequest) returns (DisconnectAccountResponse);
  rpc ListAccountOrders(ListAccountOrdersRequest) returns (ListAccountOrdersResponse);
  rpc ListAccountPositions(ListAccountPositionsRequest) returns (ListAccountPositionsResponse);
  rpc SyncAccountHistory(SyncAccountHistoryRequest) returns (SyncAccountHistoryResponse);
  rpc GetSyncStatus(GetSyncStatusRequest) returns (GetSyncStatusResponse);
}

message Account {
  string id = 1; string tenant_id = 2; string broker_id = 3; string login = 4;
  string server = 5; string account_type = 6; string currency = 7; int32 leverage = 8;
  string status = 9;           // "connecting" | "connected" | "disconnected" | "error"
  double balance = 10;
  double equity = 11;
  double margin = 12;
  double free_margin = 13;
  double margin_level = 14;
  double profit = 15;
  double profit_percent = 16;
  bool is_disabled = 17;
  string last_error = 18;
  string alias = 19;
  google.protobuf.Timestamp connected_at = 20;
  google.protobuf.Timestamp created_at = 21;
  string server_name = 22;    // display name (e.g. "Exness-Trial"), server = access
  string platform = 23;       // "MT4" or "MT5"
}
message CreateAccountRequest {
  string tenant_id = 1; string broker_id = 2; string login = 3;
  string password = 4; string server = 5; string account_type = 6;
  string mt_type = 7;  // "MT4" or "MT5"
  string server_name = 8;  // display name (e.g. "Exness-Trial")
}
message GetAccountRequest { string id = 1; }
message ListAccountsRequest { string tenant_id = 1; }
message AccountSummary {
  int32 connected_count = 1;
  double total_balance = 2;
  double total_equity = 3;
  double total_profit = 4;
}
message ListAccountsResponse { repeated Account accounts = 1; AccountSummary summary = 2; }
message DeleteAccountRequest { string id = 1; }
message DeleteAccountResponse {}
message ConnectAccountRequest { string id = 1; }
message ConnectAccountResponse {}
message DisconnectAccountRequest { string id = 1; }
message DisconnectAccountResponse {}

message ListAccountOrdersRequest {
  string account_id = 1;
  // optional date range in ISO-8601 format; empty means all history
  string from = 2;
  string to = 3;
}

message ListAccountOrdersResponse {
  repeated HistoricalOrder orders = 1;
}

message ListAccountPositionsRequest { string account_id = 1; }
message ListAccountPositionsResponse { repeated AccountPosition positions = 1; }
message AccountPosition {
  int64 ticket = 1;
  string symbol = 2;
  string side = 3;       // "buy" | "sell"
  double lots = 4;
  double open_price = 5;
  double profit = 6;
  double swap = 7;
  double commission = 8;
}

message SyncAccountHistoryRequest {
  string account_id = 1;
  string from = 2;
  string to = 3;
  bool full_resync = 4;
}
message SyncAccountHistoryResponse {
  string sync_id = 1;
  string status = 2;   // "started" | "in_progress" | "completed"
}
message GetSyncStatusRequest { string account_id = 1; }
message GetSyncStatusResponse {
  string account_id = 1;
  string sync_status = 2;      // "idle" | "syncing" | "error"
  string last_full_sync_at = 3;
  string last_incr_sync_at = 4;
  string last_error = 5;
  int32 total_synced = 6;
}

message HistoricalOrder {
  int64 ticket = 1;
  string symbol = 2;
  string side = 3;      // "buy" | "sell"
  double lots = 4;
  double open_price = 5;
  double close_price = 6;
  double profit = 7;
  double swap = 8;
  double commission = 9;
  string open_time = 10;  // RFC3339
  string close_time = 11; // RFC3339
}

service SystemSettingsService {
  rpc GetSystemSettings(GetSystemSettingsRequest) returns (GetSystemSettingsResponse);
  rpc UpdateSystemSetting(UpdateSystemSettingRequest) returns (UpdateSystemSettingResponse);
}

message SystemSetting { string key = 1; string value = 2; string description = 3; }
message GetSystemSettingsRequest {}
message GetSystemSettingsResponse { repeated SystemSetting settings = 1; }
message UpdateSystemSettingRequest { string key = 1; string value = 2; }
message UpdateSystemSettingResponse {}

service ServiceManagementService {
  rpc GetServiceStatus(GetServiceStatusRequest) returns (GetServiceStatusResponse);
  rpc RestartService(RestartServiceRequest) returns (RestartServiceResponse);
  rpc GetServiceLogs(GetServiceLogsRequest) returns (GetServiceLogsResponse);
}

message ServiceStatus { string name = 1; string container = 2; string status = 3; int32 latency_ms = 4; }
message GetServiceStatusRequest {}
message GetServiceStatusResponse { repeated ServiceStatus services = 1; }
message RestartServiceRequest { string name = 1; }
message RestartServiceResponse { string name = 1; bool ok = 2; }
message GetServiceLogsRequest { string name = 1; int32 tail = 2; string since = 3; }
message GetServiceLogsResponse { string name = 1; repeated string lines = 2; }

