# V2 format: in connectrpc-es v2, service descriptors are emitted by
# protoc-gen-es directly. The legacy protoc-gen-connect-es is removed.
# See: references/connect-es/packages/example/buf.gen.yaml
version: v2
clean: true
plugins:
  - local: protoc-gen-es
    out: ../../frontend/src/gen
    opt:
      - target=ts
